name: Sync with Upstream Juice Shop

on:
  schedule:
    # Runs every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-upstream:
    name: Fetch upstream and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/juice-shop/juice-shop.git

      - name: Fetch upstream master
        run: git fetch upstream master

      - name: Check for new upstream commits
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/master)
          FORK_SHA=$(git rev-parse origin/master)
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "fork_sha=$FORK_SHA" >> $GITHUB_OUTPUT
          if [ "$UPSTREAM_SHA" = "$FORK_SHA" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new upstream commits — skipping PR."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            COMMIT_COUNT=$(git rev-list --count origin/master..upstream/master)
            echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
            echo "$COMMIT_COUNT new upstream commit(s) found."
          fi

      - name: Create sync branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          BRANCH="upstream-sync/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH" upstream/master
          git push origin "$BRANCH" --force
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Build PR body
        if: steps.check.outputs.has_changes == 'true'
        id: pr_body
        run: |
          COMMIT_LOG=$(git log --oneline --no-merges origin/master..upstream/master | head -30)
          {
            echo 'body<<EOF'
            echo "## Weekly Upstream Sync"
            echo ""
            echo "This PR pulls the latest **${{ steps.check.outputs.commit_count }} commit(s)** from [juice-shop/juice-shop](https://github.com/juice-shop/juice-shop) upstream."
            echo ""
            echo "### New commits from upstream"
            echo '```'
            echo "$COMMIT_LOG"
            echo '```'
            echo ""
            echo "### Review checklist"
            echo "- [ ] Review the diff for conflicts with fork-specific changes"
            echo "- [ ] Confirm no unintended changes to fork customizations"
            echo "- [ ] Verify CI passes before merging"
            echo ""
            echo "_Upstream SHA: \`${{ steps.check.outputs.upstream_sha }}\`_"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Open pull request
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${process.env.BRANCH}`,
            });

            if (existingPRs.length > 0) {
              console.log(`PR already exists: ${existingPRs[0].html_url}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: upstream sync from juice-shop/juice-shop (${new Date().toISOString().split('T')[0]})`,
              head: process.env.BRANCH,
              base: 'master',
              body: `${{ steps.pr_body.outputs.body }}`,
              draft: false,
            });

            console.log(`PR created: ${pr.html_url}`);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['upstream-sync'],
            });
